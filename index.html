  <!-- Server Wake-Up Ping: fires immediately on page load, before React mounts.
       Railway servers sleep after inactivity. This wakes the dyno as early as
       possible to minimize the "Connecting..." delay for the user.
       The URL is stored in localStorage by the app after first successful connect. -->
  <script>
    (function () {
      try {
        // SocketContext saves the URL to localStorage after first successful connect.
        // On subsequent loads, we immediately fire a wake-up HTTP GET to the backend.
        var serverUrl = localStorage.getItem('vantage_socket_url');
        if (serverUrl) {
          var xhr = new XMLHttpRequest();
          xhr.open('GET', serverUrl + '/health', true);
          xhr.timeout = 20000;
          xhr.send(); // fire-and-forget; errors silently ignored
        }
      } catch (e) { /* ignore any storage/CORS errors */ }
    })();
  </script>

  <!-- Theme Initialization -->
  <script>
    (function () {
      const savedTheme = localStorage.getItem('vantage_theme');
      const root = document.documentElement;
      // Default to dark, only change if explicitly light
      if (savedTheme === 'light') {
        root.style.setProperty('--c-royal-950', '248 250 252'); // Slate 50
        root.style.setProperty('--c-royal-900', '255 255 255'); // White
        root.style.setProperty('--c-royal-800', '226 232 240'); // Slate 200
        root.style.setProperty('--c-text-white', '15 23 42');   // Slate 900
        root.style.setProperty('--c-text-base', '51 65 85');    // Slate 700
      } else {
        // Dark Mode Defaults
        root.style.setProperty('--c-royal-950', '15 10 31');
        root.style.setProperty('--c-royal-900', '26 16 60');
        root.style.setProperty('--c-royal-800', '45 27 105');
        root.style.setProperty('--c-text-white', '255 255 255');
        root.style.setProperty('--c-text-base', '226 232 240');
      }
    })();
  </script>
